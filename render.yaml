services:
  - type: web
    name: tingt-clone-web
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_PROVIDER
        value: minimax
      - key: MINIMAX_MODEL
        value: MiniMax-M2.5
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: MINIMAX_API_KEY
        sync: false
