<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css?v=20260415i" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>TingT</h1>
        <p class="subtitle">有话直接发。</p>
      </section>

      <section class="chat-shell">
        <div id="chat-log" class="chat-log">
          <div class="message assistant">
            <p class="meta">TingT</p>
            <p>我在。</p>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-head">
            <p class="composer-title">说</p>
            <p class="composer-tip">Enter 发送，Shift + Enter 换行</p>
          </div>
          <textarea
            id="message-input"
            name="message"
            rows="1"
            placeholder="发一句试试"
            required
          ></textarea>
          <div class="composer-row">
            <p class="hint">想到哪说到哪。</p>
            <button type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js?v=20260415i"></script>
  </body>
</html>
