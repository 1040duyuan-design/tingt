<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css?v=20260415h" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>{{ title }}</h1>
        <p class="subtitle">这是基于 TingT 真实聊天风格和经历信息整理出来的数字分身。</p>
        <p class="subtitle secondary">下面直接聊就行。</p>
      </section>

      <section class="chat-shell">
        <div id="chat-log" class="chat-log">
          <div class="message assistant">
            <p class="meta">TingT</p>
            <p>我在，说吧。</p>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-head">
            <p class="composer-title">聊天</p>
            <p class="composer-tip">Enter 发送，Shift + Enter 换行</p>
          </div>
          <textarea
            id="message-input"
            name="message"
            rows="1"
            placeholder="输入你想说的话..."
            required
          ></textarea>
          <div class="composer-row">
            <p class="hint">像平时聊天一样发就行。</p>
            <button type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js?v=20260415h"></script>
  </body>
</html>
