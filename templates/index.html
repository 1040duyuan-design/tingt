<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css?v=20260415b" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">TingT Clone</p>
          <h1>{{ title }}</h1>
          <p class="subtitle">{{ subtitle }}</p>
        </div>
        <div class="hero-note">
          <p class="note-label">当前状态</p>
          <p class="note-value">可直接聊天</p>
          <p class="note-text">回车发送，Shift + 回车换行。</p>
        </div>
      </section>

      <section class="chat-shell">
        <div id="chat-log" class="chat-log">
          <div class="message assistant">
            <p class="meta">TingT 分身</p>
            <p>在。你直接说。</p>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-head">
            <p class="composer-title">直接开聊</p>
            <p class="composer-tip">Enter 发送，Shift + Enter 换行</p>
          </div>
          <textarea
            id="message-input"
            name="message"
            rows="1"
            placeholder="输入你想说的话..."
            required
          ></textarea>
          <div class="composer-row">
            <p class="hint">这是测试版，偶尔会不稳，但我会继续收。</p>
            <button type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js?v=20260415b"></script>
  </body>
</html>
